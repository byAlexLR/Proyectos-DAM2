<!DOCTYPE html>
<!-- byAlexLR -->
<!-- Esta es la estructura principal de la interfaz web. -->

<html lang="es">
<head>
    <!-- Configuro metadatos, fuentes y estilos externos -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedritos House | Eventos</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Google Fonts: 'Montserrat' for headers, 'Inter' for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-background"></div>
    <div class="app-container">
        <!-- HEADER: Logotipo y Navegación -->
        <header>
            <div class="logo">
                <i class="fa-solid fa-gem"></i> Pedritos House
            </div>
            <nav id="main-nav">
                <!-- Los botones se muestran/ocultan según el estado de login en app.js -->
                <button onclick="showSection('login-section')" id="nav-login"><i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión</button>
                <button onclick="showSection('register-section')" id="nav-register"><i class="fa-solid fa-user-plus"></i> Registrarse</button>
                <button onclick="showSection('events-section')" id="nav-events" style="display:none;"><i class="fa-solid fa-calendar-days"></i> Catálogo</button>
                <button onclick="showSection('bookings-section')" id="nav-bookings" style="display:none;"><i class="fa-solid fa-ticket"></i> Mis Reservas</button>
                <button onclick="showSection('stats-section')" id="nav-stats" style="display:none;"><i class="fa-solid fa-chart-line"></i> Estadísticas</button>
                <button onclick="logout()" id="nav-logout" style="display:none;"><i class="fa-solid fa-right-from-bracket"></i> Salir</button>
            </nav>
        </header>

        <main>
            <!-- LOGIN SECTION: Formulario de entrada -->
            <section id="login-section" class="active-section glass-panel">
                <div class="section-header">
                    <h2>Bienvenido de nuevo</h2>
                    <p>Accede a tu cuenta exclusiva</p>
                </div>
                <form id="login-form">
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="login-username" placeholder="Usuario" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Contraseña" required>
                    </div>
                    <button type="submit" class="btn-primary">Entrar</button>
                </form>
                <p id="login-message" class="message"></p>
            </section>

            <!-- REGISTER SECTION: Formulario de nuevo usuario -->
            <section id="register-section" class="glass-panel">
                <div class="section-header">
                    <h2>Únete a nosotros</h2>
                    <p>Crea tu cuenta hoy</p>
                </div>
                <form id="register-form">
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="reg-username" placeholder="Usuario" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Contraseña" required>
                    </div>
                    <button type="submit" class="btn-primary">Registrarse</button>
                </form>
                <p id="reg-message" class="message"></p>
            </section>

            <!-- EVENTS SECTION: Catálogo y Filtros -->
            <section id="events-section" class="glass-panel wide-panel">
                <div class="section-header">
                    <h2>Catálogo Exclusivo</h2>
                    <p>Experiencias diseñadas para ti</p>
                </div>
                <div class="filters">
                    <!-- Barra de filtros para buscar eventos -->
                    <div class="input-group small">
                        <i class="fa-solid fa-filter"></i>
                        <input type="text" id="filter-category" placeholder="Categoría">
                    </div>
                    <div class="input-group small">
                        <i class="fa-solid fa-euro-sign"></i>
                        <input type="number" id="filter-min" placeholder="Min">
                    </div>
                    <div class="input-group small">
                        <i class="fa-solid fa-euro-sign"></i>
                        <input type="number" id="filter-max" placeholder="Max">
                    </div>
                    <button onclick="loadEvents()" class="btn-secondary">Filtrar</button>
                </div>
                <div id="events-list" class="grid-container"></div>
            </section>

            <!-- BOOKINGS SECTION: Historial de reservas -->
            <section id="bookings-section" class="glass-panel wide-panel">
                <div class="section-header">
                    <h2>Mis Reservas</h2>
                    <button onclick="loadBookings()" class="btn-icon"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
                <div id="bookings-list" class="list-container"></div>
            </section>

            <!-- STATS SECTION: Dashboard -->
            <section id="stats-section" class="glass-panel">
                <div class="section-header">
                    <h2>Panel de Control</h2>
                    <button onclick="loadStats()" class="btn-icon"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
                <div id="stats-content" class="stats-grid"></div>
            </section>
        </main>
    </div>
    <!-- Lógica del cliente -->
    <script src="/static/js/app.js"></script>
</body>
</html>
